{% extends "base.html" %}

{% block content %}
    <article>
        <h1>{{ publicacion.titulo }}</h1>
        <p><strong>Autor:</strong> {{ publicacion.autor }}</p>
        <p><strong>Fecha:</strong> {{ publicacion.fecha_publicacion }}</p>
        <div>
            {{ publicacion.contenido|linebreaks }}
        </div>
    </article>
    <br>
    <a href="{% url 'publicaciones:lista_publicaciones' %}">← Volver al listado</a>
{% endblock %}
